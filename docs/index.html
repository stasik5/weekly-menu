<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Menu — April 6-12, 2026</title>
<style>
:root{--bg:#0f1117;--s:#1a1d27;--s2:#242836;--b:#2e3348;--t:#e4e4e7;--t2:#9ca3af;--a:#6366f1;--a2:#818cf8;--sl:#f59e0b;--as:#10b981;--d:#ef4444;--ok:#22c55e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--t);line-height:1.6}
.hd{background:linear-gradient(135deg,#1a1d27,#242836);border-bottom:1px solid var(--b);padding:24px;text-align:center}
.hd h1{font-size:1.8em}.hd .sub{color:var(--t2);margin-top:4px}
.hd .bal{display:inline-flex;gap:16px;margin-top:12px;background:var(--s);border-radius:12px;padding:8px 16px;font-size:.9em}
.bal .sl{color:var(--sl)}.bal .as{color:var(--as)}
nav{display:flex;border-bottom:1px solid var(--b);background:var(--s);position:sticky;top:0;z-index:10}
nav button{flex:1;padding:12px;text-align:center;cursor:pointer;border:none;background:none;color:var(--t2);font-size:.95em;font-weight:500;border-bottom:2px solid transparent;transition:.2s}
nav button:hover{color:var(--t);background:var(--s2)}
nav button.on{color:var(--a2);border-bottom-color:var(--a)}
.tc{display:none}.tc.on{display:block}
.dc{margin:16px;background:var(--s);border-radius:12px;border:1px solid var(--b);overflow:hidden}
.dh{padding:14px 18px;background:var(--s2);font-weight:600;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center}
.dd{color:var(--t2);font-size:.85em;font-weight:400}
.mr{display:flex;align-items:center;padding:12px 18px;border-bottom:1px solid var(--b);cursor:pointer;transition:.15s}
.mr:last-child{border-bottom:none}.mr:hover{background:var(--s2)}
.mt{width:70px;font-size:.8em;text-transform:uppercase;color:var(--t2);font-weight:600;letter-spacing:.5px;flex-shrink:0}
.mi{flex:1}.mn{font-weight:500}.mm{font-size:.8em;color:var(--t2);margin-top:2px}
.cb{font-size:.7em;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;flex-shrink:0;margin-left:8px}
.cb-s{background:rgba(245,158,11,.15);color:var(--sl)}.cb-a{background:rgba(16,185,129,.15);color:var(--as)}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.mo.show{display:flex}
.md{background:var(--s);border-radius:16px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;border:1px solid var(--b)}
.mh{padding:20px 24px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--s);z-index:1}
.mh h2{font-size:1.2em}.mc{background:none;border:none;color:var(--t2);font-size:1.5em;cursor:pointer}.mc:hover{color:var(--t)}
.mb{padding:20px 24px}.mb h3{font-size:.9em;color:var(--a2);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px}.mb h3:first-child{margin-top:0}
.il{list-style:none}.il li{padding:4px 0;font-size:.9em;display:flex;justify-content:space-between;border-bottom:1px solid rgba(46,51,72,.5)}.il li:last-child{border-bottom:none}
.ia{color:var(--t2)}.ins{font-size:.9em;color:var(--t2);line-height:1.7}
.gc{margin:12px 16px;background:var(--s);border-radius:12px;border:1px solid var(--b);overflow:hidden}
.gh{padding:12px 18px;background:var(--s2);font-weight:600;font-size:.95em;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.gh:hover{background:#2a2f40}.gc2{font-size:.8em;color:var(--t2);background:var(--bg);padding:2px 8px;border-radius:8px}
.gi{display:flex;align-items:center;padding:10px 18px;border-top:1px solid var(--b);font-size:.9em}
.gi input{margin-right:10px;accent-color:var(--a);width:18px;height:18px}
.gn{flex:1}.ga{color:var(--t2);font-size:.85em;margin-left:8px}
.gi.chk .gn{text-decoration:line-through;color:var(--t2)}
.ps{margin:12px 16px;background:var(--s);border-radius:12px;border:1px solid var(--b);overflow:hidden}
.ph{padding:12px 18px;background:var(--s2);font-weight:600;font-size:.95em;border-bottom:1px solid var(--b)}
.pi{display:flex;align-items:center;padding:10px 18px;border-bottom:1px solid var(--b);font-size:.9em}.pi:last-child{border-bottom:none}
.pt{width:10px;height:10px;border-radius:50%;margin-right:12px;flex-shrink:0}
.pt.ok{background:var(--ok)}.pt.no{background:var(--d)}
.pn{flex:1}.pq{color:var(--t2);font-size:.85em}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px}
.sc{background:var(--s);border-radius:12px;padding:16px;border:1px solid var(--b);text-align:center}
.sv{font-size:1.8em;font-weight:700;color:var(--a2)}.sl{font-size:.8em;color:var(--t2);margin-top:4px}
</style>
</head>
<body>
<div class="hd">
<h1>🍽️ Weekly Menu</h1>
<div class="sub">April 6 — April 12, 2026</div>
<div class="bal"><span class="sl">🇺🇦 Slavic 62%</span><span style="color:var(--t2)">·</span><span class="as">🥢 Asian 38%</span></div>
</div>
<nav><button class="on" data-t="menu" onclick="st(this)">📋 Menu</button><button data-t="grocery" onclick="st(this)">🛒 Grocery</button><button data-t="pantry" onclick="st(this)">🏪 Pantry</button></nav>
<div id="t-menu" class="tc on"></div>
<div id="t-grocery" class="tc"></div>
<div id="t-pantry" class="tc"></div>
<div class="mo" id="rm" onclick="if(event.target===this)cm()"><div class="md"><div class="mh"><h2 id="mTitle"></h2><button class="mc" onclick="cm()">×</button></div><div class="mb" id="mBody"></div></div></div>
<script>
function st(b){document.querySelectorAll("nav button").forEach(x=>x.classList.remove("on"));b.classList.add("on");document.querySelectorAll(".tc").forEach(x=>x.classList.remove("on"));document.getElementById("t-"+b.dataset.t).classList.add("on")}
</script>
<script src="data.js"></script>
</body></html>
